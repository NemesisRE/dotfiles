# aqua global config — managed by chezmoi
# Add or comment-out packages to control what gets installed.
# Run `aqua install` (or `chezmoi apply`) to apply changes.
# https://aquaproj.github.io/docs/reference/config/

registries:
  - type: standard
    ref: v4.513.1 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: registry.yaml

packages:
  # ── Shell / Terminal ────────────────────────────────────────────────────────
  - name: rossmacarthur/sheldon@0.8.5 # zsh plugin manager
  - name: atuinsh/atuin@v18.16.1 # shell history
  - name: junegunn/fzf@v0.72.0 # fuzzy finder
  - name: zellij-org/zellij@v0.44.3 # terminal multiplexer
  - name: sxyazi/yazi@v26.5.6 # terminal file manager

  # ── File / Text Utils ───────────────────────────────────────────────────────
  - name: lsd-rs/lsd@v1.2.0 # ls replacement
  - name: sharkdp/bat@v0.26.1 # cat replacement
  - name: sharkdp/fd@v10.4.2 # find replacement
  - name: sharkdp/diskus@v0.9.0 # disk usage
  - name: BurntSushi/ripgrep@15.1.0 # grep replacement
  - name: muesli/duf@v0.9.1 # df replacement
  - name: bootandy/dust@v1.2.4 # du replacement
  - name: ouch-org/ouch@0.7.1 # archive tool
  - name: natesales/q@v0.19.12 # DNS client
    registry: local

  # ── Dev Tools ───────────────────────────────────────────────────────────────
  - name: cli/cli@v2.92.0 # GitHub CLI (gh)
  - name: jqlang/jq@jq-1.8.1 # JSON processor
  - name: mikefarah/yq@v4.53.2 # YAML processor
  - name: jesseduffield/lazygit@v0.61.1
  - name: helix-editor/helix@25.07.1
  - name: aristocratos/btop@latest # system monitor
  - name: bcicen/ctop@v0.7.7 # container monitor
  - name: JanDeDobbeleer/oh-my-posh@v29.14.0 # prompt theming engine
  - name: smallstep/cli@v0.30.2 # step CA / cert tool
  - name: mr-karan/doggo@v1.1.5 # DNS lookup tool

  # ── Kubernetes (uncomment to install) ───────────────────────────────────────
  - name: kubernetes/kubernetes/kubectl@v1.36.1
  - name: kubernetes/kubernetes/kubeadm@v1.30.3
  - name: derailed/k9s@v0.50.18
  - name: kubernetes-sigs/kustomize@kustomize/v5.8.1
  - name: kubernetes-sigs/krew@v0.5.0
  - name: velero-io/velero@v1.18.1
  - name: projectcalico/calico/calicoctl@v3.32.0
  - name: bitnami-labs/sealed-secrets@v0.36.6 # kubeseal
  - name: doitintl/kube-no-trouble@0.7.3 # kubent
  - name: stern/stern@v1.34.0
  - name: oras-project/oras@v1.3.2
  - name: fluxcd/flux2@v2.8.7 # flux CLI
  - name: helmfile/helmfile@v1.5.1
  - name: helm/helm@v4.2.0

  # ── Optional ────────────────────────────────────────────────────────────────
  - name: bitwarden/clients@cli-v2026.4.1 # bw CLI (needed for SSH TOTP)
  - name: hashicorp/terraform@v1.15.3
  - name: hashicorp/packer@v1.15.3
  - name: hashicorp/vault@v2.0.1
