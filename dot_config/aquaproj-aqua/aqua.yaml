# aqua global config — managed by chezmoi
# Add or comment-out packages to control what gets installed.
# Run `aqua install` (or `chezmoi apply`) to apply changes.
# https://aquaproj.github.io/docs/reference/config/

registries:
  - type: standard
    ref: v4.541.0 # renovate: depName=aquaproj/aqua-registry
  - name: local
    type: local
    path: registry.yaml

packages:
  # ── Shell / Terminal ────────────────────────────────────────────────────────
  - name: rossmacarthur/sheldon@0.8.5 # zsh plugin manager
    tags:
      - default
      - required
  - name: atuinsh/atuin@v18.17.1 # shell history
    tags:
      - default
      - required
  - name: junegunn/fzf@v0.74.1 # fuzzy finder
    tags:
      - default
      - required
  - name: zellij-org/zellij@v0.44.3 # terminal multiplexer
    tags:
      - default
      - required
  - name: sxyazi/yazi@v26.5.6 # terminal file manager
    tags:
      - default
      - required

  # ── File / Text Utils ───────────────────────────────────────────────────────
  - name: lsd-rs/lsd@v1.2.0 # ls replacement
    tags:
      - default
      - required
  - name: sharkdp/bat@v0.26.1 # cat replacement
    tags:
      - default
      - required
  - name: sharkdp/fd@v10.4.2 # find replacement
    tags:
      - default
      - required
  - name: sharkdp/diskus@v0.9.0 # disk usage
    tags:
      - default
  - name: BurntSushi/ripgrep@15.2.0 # grep replacement
    tags:
      - default
      - required
  - name: muesli/duf@v0.9.1 # df replacement
    tags:
      - default
  - name: bootandy/dust@v1.2.4 # du replacement
    tags:
      - default
  - name: ouch-org/ouch@0.8.1 # archive tool
    tags:
      - default
  - name: natesales/q@v0.19.12 # DNS client
    registry: local
    tags:
      - default

  # ── Dev Tools ───────────────────────────────────────────────────────────────
  - name: cli/cli@v2.96.0 # GitHub CLI (gh)
    tags:
      - default
  - name: jqlang/jq@jq-1.8.1 # JSON processor
    tags:
      - default
  - name: mikefarah/yq@v4.53.3 # YAML processor
    tags:
      - default
  - name: jesseduffield/lazygit@v0.63.1
    tags:
      - default
  - name: helix-editor/helix@25.07.1
    tags:
      - default
  - name: aristocratos/btop@1.4.7 # system monitor
    tags:
      - default
  - name: bcicen/ctop@v0.7.7 # container monitor
    tags:
      - default
  - name: JanDeDobbeleer/oh-my-posh@v29.35.0 # prompt theming engine
    tags:
      - default
      - required
  - name: smallstep/cli@v0.30.6 # step CA / cert tool
    tags:
      - default

  # ── Kubernetes (uncomment to install) ───────────────────────────────────────
  - name: kubernetes/kubernetes/kubectl@v1.36.3
    tags:
      - k8s
  - name: kubernetes/kubernetes/kubeadm@v1.36.3
    tags:
      - k8s
  - name: derailed/k9s@v0.51.0
    tags:
      - k8s
  - name: kubernetes-sigs/kustomize@kustomize/v5.8.1
    tags:
      - k8s
  - name: kubernetes-sigs/krew@v0.5.0
    tags:
      - k8s
  - name: velero-io/velero@v1.18.2
    tags:
      - k8s
  - name: projectcalico/calico/calicoctl@v3.32.1
    tags:
      - k8s
  - name: bitnami-labs/sealed-secrets@v0.38.4 # kubeseal
    tags:
      - k8s
  - name: doitintl/kube-no-trouble@0.7.3 # kubent
    tags:
      - k8s
  - name: stern/stern@v1.34.0
    tags:
      - k8s
  - name: oras-project/oras@v1.3.3
    tags:
      - k8s
  - name: fluxcd/flux2@v2.9.2 # flux CLI
    tags:
      - k8s
  - name: helmfile/helmfile@v1.7.1
    tags:
      - k8s
  - name: helm/helm@v4.2.3
    tags:
      - k8s

  # ── Optional ────────────────────────────────────────────────────────────────
  - name: bitwarden/clients@cli-v2026.4.1 # bw CLI (needed for SSH TOTP)
    tags:
      - optional
  - name: hashicorp/terraform@v1.15.8
    tags:
      - optional
  - name: hashicorp/packer@v1.15.4
    tags:
      - optional
  - name: hashicorp/vault@v2.0.3
    tags:
      - optional
  - name: astral-sh/uv@0.11.31 # universal version manager
    tags:
      - optional
  - name: astral-sh/ruff@0.15.22 # Python linter/formatter
    tags:
      - optional
