name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── ShellCheck ───────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: ShellCheck — shell function library
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: dot_local/share/nredf/shell
          severity: warning

      - name: ShellCheck — bootstrap & run-once scripts
        uses: ludeeus/action-shellcheck@master
        with:
          additional_files: >-
            bootstrap.sh
            .chezmoiscripts/run_once_before_install-tools.sh.tmpl
          severity: warning

  # ── YAML lint ────────────────────────────────────────────────────────────────
  yamllint:
    name: YAML lint
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .chezmoidata/
          config_file: .yamllint.yml

  # ── chezmoi template dry-run ─────────────────────────────────────────────────
  chezmoi-dry-run:
    name: chezmoi apply --dry-run
    if: github.event_name != 'pull_request' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "${HOME}/.local/bin"

      - name: Dry-run — verify all templates render without errors
        env:
          NREDF_NO_BOOTSTRAP: "1"
        run: |
          export PATH="${HOME}/.local/bin:${PATH}"
          chezmoi apply --dry-run --force --source="${GITHUB_WORKSPACE}" 2>&1
