# Aqua configuration (registries + packages)
# Format follows Aqua upstream registry schema. Pin package versions for
# reproducible installs using `owner/repo@vX.Y.Z` in the `name` field.

registries:
  - type: standard
    ref: v4.155.1 # renovate: depName=aquaproj/aqua-registry

packages:
  - name: atuinsh/atuin
  - name: aristocratos/btop
  - name: bcicen/ctop
  - name: bootandy/dust
  - name: BurntSushi/ripgrep
  - name: cli/cli
  - name: derailed/k9s
  - name: jesseduffield/lazygit
  - name: junegunn/fzf
  - name: lsd-rs/lsd
  - name: mikefarah/yq
  - name: muesli/duf
  - name: natesales/q
  - name: starship/starship
  - name: helix-editor/helix
  - name: jqlang/jq
  - name: kubernetes-sigs/kustomize
  - name: kubernetes-sigs/krew
  - name: vmware-tanzu/velero
  - name: projectcalico/calico
  - name: bitnami-labs/sealed-secrets
  - name: doitintl/kube-no-trouble
  - name: harness/drone-cli
  - name: oras-project/oras
  - name: asdf-vm/asdf
  - name: devmatteini/dra
  - name: mr-karan/doggo
  - name: ouch-org/ouch
  - name: sharkdp/diskus
  - name: sharkdp/fd
  - name: smallstep/cli
  - name: stern/stern
  - name: zellij-org/zellij

# Notes:
# - Pin versions by appending @vX.Y.Z to `name` (highly recommended).
# - `kubeadm`/`kubectl` remain as direct dl.k8s.io installers in the
#   Homesick scripts because Kubernetes distributes platform binaries there.
# - Review the `jqlang/jq` vs `stedolan/jq` choice and other forks if
#   canonical upstream repos are preferred.
# Run `chezmoi apply` to render the final install script.
