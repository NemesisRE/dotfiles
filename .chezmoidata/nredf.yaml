# nredf config defaults for chezmoi (source of truth)
# Missing machine-local scalar values are prompted once on interactive
# init/apply/update and then cached locally in ~/.config/chezmoi/nredf-local.env.

nredfDefaults:
  shell:
    generell:
      multiplexer: true

    aqua:
      vacuum_days: 30

    ssh:
      agent: default # options: default, pipe, gpg, bitwarden
      totp_provider: "bitwarden"

    other:
      test_var: "example"

  gitConfig:
    user:
      name: ""
      email: ""
      signingkey: ""

    gpg:
      format: ssh # options: openpgp, ssh
